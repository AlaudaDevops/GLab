apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tektoncd-tools-GLab
  title: Tektoncd Tools - GLab
  description: GLab 是 GitLab 官方命令行工具，在 Tekton 任务镜像中用于与 GitLab 仓库交互，支持 MR 创建、评论、状态查询等 CI/CD 集成场景。
  tags:
    - tool
    - gitlab
    - open-source-fork
  links:
    - url: https://github.com/AlaudaDevops/GLab
      title: GitHub Repository
      icon: github
    - url: https://build-sonar.alauda.cn/dashboard?id=github.com-AlaudaDevops-GLab
      title: SonarQube
      icon: dashboard
    - url: https://gitlab.com/gitlab-org/cli
      title: Upstream Repository
      icon: github
  annotations:
    # github plugin
    github.com/project-slug: AlaudaDevops/GLab
    # sonarqube plugin
    sonarqube.org/project-key: github.com-AlaudaDevops-GLab
    # 开源组件代码仓库地址，格式：${url}/${project}/${repo}
    acp.cpaas.io/open-source-component-repo: https://gitlab.com/gitlab-org/cli
    # 开源组件的版本信息，只适用于开源组件，自研组件默认不收集版本信息,格式 ${version}
    acp.cpaas.io/open-source-component-version: v1.82.1
    # 开源组件的license信息,格式 ${license}
    acp.cpaas.io/open-source-component-license: MIT
    # 开源组件的license地址,格式 ${url}/${project}/${repo}/${license-path}
    acp.cpaas.io/open-source-component-license_url: https://gitlab.com/gitlab-org/cli/-/blob/main/LICENSE
    # backstage techdocs plugin
    backstage.io/techdocs-ref: dir:../
    acp.cpaas.io/owner: qingliu@alauda.io

    # 组件属性，区别是否部署时必带的核心组件,可选值为 core 和 plugin。
    acp.cpaas.io/functional-attributes: plugin

spec:
  type: service
  system: system:alauda-devops-system
  lifecycle: production
  owner: devops
