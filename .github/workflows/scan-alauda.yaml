name: Scan vulnerabilities for Alauda
on:
  pull_request:
    branches:
      - main
      - 'alauda-v*'
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/scan-alauda.yaml'
  push:
    branches:
      - main
      - 'alauda-v*'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    name: Scan Go vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Generate version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          GENERATED_VERSION="0.0.0-${SHORT_SHA}"
          echo "GENERATED_VERSION=$GENERATED_VERSION" >> $GITHUB_ENV

      - name: Get Go version
        run: |
          GO_VERSION=$(go version | awk '{print $3}')
          echo "GO_VERSION=$GO_VERSION" >> $GITHUB_ENV

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.1.0
          args: release --snapshot -f=goreleaser-alauda.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          # Pin Trivy to a currently available release to avoid installer 404 on retired old assets.
          version: 'v0.69.3'
          scan-type: 'rootfs'
          scan-ref: 'dist/glab_linux_amd64_v1/alauda-glab'
          exit-code: 1
